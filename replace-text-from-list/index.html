<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>txt置換（TAB区切りワードリスト使用）</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>txt置換（TAB区切りワードリスト使用）</h1>
      <div>
        <label for="inputText">入力テキスト（A）</label>
        <textarea id="inputText" rows="10"></textarea>
      </div>
      <div>
        <label for="rules">置換ルール（B）</label>
        <p>1行ごとに「置換前[TAB]置換後」の形式で記述してください。</p>
        <textarea
          id="rules"
          rows="8"
          placeholder="foo[TAB]bar&#10;abc[TAB]XYZ"
        ></textarea>
      </div>

      <div>
        <button id="run">置換実行</button>
      </div>
      <div>
        <label for="outputText">出力結果</label>
        <textarea id="outputText" rows="10" readonly></textarea>
      </div>

      <script>
        function parseRules(text) {
          const lines = text.split(/\r?\n/);
          const rules = [];
          for (const line of lines) {
            if (!line.trim()) continue;
            const parts = line.split("\t");
            if (parts.length < 2) continue;
            const from = parts[0];
            const to = parts.slice(1).join("\t"); // 2つ目以降を結合して「置換後」
            rules.push({ from, to });
          }
          return rules;
        }

        // シンプルな全置換（正規表現の特殊文字をエスケープ）
        function replaceAllSimple(str, from, to) {
          const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const re = new RegExp(escaped, "g");
          return str.replace(re, to);
        }

        document.getElementById("run").addEventListener("click", () => {
          let text = document.getElementById("inputText").value;
          const rulesText = document.getElementById("rules").value;

          const rules = parseRules(rulesText);
          for (const r of rules) {
            text = replaceAllSimple(text, r.from, r.to);
          }

          document.getElementById("outputText").value = text;
        });
      </script>
    </div>
  </body>
</html>
