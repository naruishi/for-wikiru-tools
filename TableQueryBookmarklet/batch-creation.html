<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>テーブルフィルター用JSONパーツ生成ツール</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>テーブルフィルター用JSONパーツ生成ツール</h1>

      <!-- buttonName / regexStr の元になる , 区切りリスト -->
      <label>
        buttonName一覧 (,区切り):
        <textarea
          id="buttonList"
          placeholder="例: バフ,遠,横,回復,近,十,縦,全,単,中,物魔,補助"
        ></textarea>
      </label>

      <!-- 変換ボタン -->
      <button id="convertBtn">JSONに変換</button>

      <!-- 出力 -->
      <label>
        出力JSON:
        <textarea id="output" readonly></textarea>
      </label>

      <script>
        document.getElementById("convertBtn").addEventListener("click", () => {
          const listStr = document.getElementById("buttonList").value;

          if (!listStr.trim()) {
            alert("buttonNameを入力してください。");
            return;
          }

          // , 区切りで分割してトリム
          const names = listStr
            .split(",")
            .map((s) => s.trim())
            .filter((s) => s.length > 0);

          // JSONパーツ生成
          const result = names.map((name) => ({
            buttonName: name,
            regexStr: name,
            exceptStr: "",
          }));

          // 配列として出力（必要ならここを変更して1行1オブジェクトにもできる）
          const outputText = JSON.stringify(result, null, 2);
          document.getElementById("output").value = outputText
            .replace("[", "")
            .replace("]", "");
        });
      </script>
    </div>
  </body>
</html>
